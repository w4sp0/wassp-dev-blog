{{ define "main" }}
{{ .Content }}
<h2>Recent Posts</h2>
{{ range first 10 (where .Site.RegularPages "Section" "posts") }}
<article class="post-item">
  <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
  <div class="meta">
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
  </div>
  {{ with .Summary }}<p>{{ . }}</p>{{ end }}
</article>
{{ end }}
{{ end }}
